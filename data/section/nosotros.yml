name: Nosotros
size: md
boxes:
- title: '{{ get sections.nosotros.title }}'
  sub: '{{ get sections.nosotros.sub }}'
  icon: '{{ get sections.nosotros.icon }}'
  box:
    cols: 2
    gap: 4
    gap_vs: 2
    line: y
    align_y: center
    align: left
  boxes:
  - img: '{{ get sections.nosotros.img }}'
  - box:
      line: y
      gap: 4
      gap_vs: 2
    get:
    - from: sections.nosotros.boxes
      to: boxes
