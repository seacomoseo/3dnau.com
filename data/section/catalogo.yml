name: Catálogo
boxes:
- title: '{{ get sections.catalogo.title }}'
  sub: '{{ get sections.catalogo.sub }}'
  icon: '{{ get sections.catalogo.icon }}'
  space: 2
  box:
    icon_pos: side
  boxes:
  - md: <br>
  - title: '{{ get sections.catalogo.biologia.title }}'
    hn: h3
    icon: '{{ get sections.catalogo.biologia.icon }}'
    list:
      type: product
      category:
      - biologia
      max: 12
    box:
      cols: 4
      slider: y
  - md: <br>
  - title: '{{ get sections.catalogo.psicopedagogia.title }}'
    hn: h3
    icon: '{{ get sections.catalogo.psicopedagogia.icon }}'
    list:
      type: product
      category:
      - psicopedagogia
      max: 12
    box:
      cols: 4
      slider: y
  - md: '{{% get sections.catalogo.md %}}'
