name: Nuestra Propuesta
boxes:
- title: '{{ get sections.propuesta.title }}'
  sub: '{{ get sections.propuesta.sub }}'
  icon: '{{ get sections.propuesta.icon }}'
  space: 2
  boxes:
  - box:
      duo: 2
      gap: 4
      gap_vs: 1
      line: y
      align_y: center
      align: left
    boxes:
    - img: '{{ get sections.propuesta.primera.img }}'
    - title: '{{ get sections.propuesta.primera.title }}'
      md: '{{% get sections.propuesta.primera.md %}}'
  - box:
      duo: 1
      gap: 4
      gap_vs: 1
      line: y
      align_y: center
      align: left
    boxes:
    - img: '{{ get sections.propuesta.segunda.img }}'
    - title: '{{ get sections.propuesta.segunda.title }}'
      md: '{{% get sections.propuesta.segunda.md %}}'
